<div class="container">
  <h1 class="title">Books Library</h1>

  <div class="controls-bar">
    <div class="books-actions">
      <button mat-raised-button (click)="addBook()">Add Book</button>
      <button mat-raised-button (click)="importBooks()">Import</button>
      <button mat-raised-button (click)="exportBooks()" [disabled]="!booksCount()">
        Export{{ booksCount() ? ` (${booksCount()})` : '' }}
      </button>
    </div>

    <div>
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Search books</mat-label>
        <input
          matInput
          type="text"
          placeholder="Title"
          [value]="searchQuery()"
          (input)="updateSearch($event.target.value)"
        />

        <button
          (click)="clearSearch()"
          [class.invisible]="!searchQuery()"
          matSuffix
          mat-icon-button
          aria-label="Clear search"
        >
          <mat-icon fontIcon="close"></mat-icon>
        </button>
      </mat-form-field>
    </div>
  </div>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
    <ng-container matColumnDef="author">
      <th mat-header-cell *matHeaderCellDef>
        <span class="sortable" (click)="sortAuthor()">
          Author
          <span class="sort-icon">{{ sortIcon(authorOrder()) }}</span>
        </span>
      </th>
      <td mat-cell *matCellDef="let element">{{ element.author }}</td>
    </ng-container>

    <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef>
        <span class="sortable" (click)="sortTitle()">
          Title
          <span class="sort-icon">{{ sortIcon(titleOrder()) }}</span>
        </span>
      </th>
      <td mat-cell *matCellDef="let element">{{ element.title }}</td>
    </ng-container>

    <ng-container matColumnDef="pages">
      <th mat-header-cell *matHeaderCellDef>
        <span class="non-sortable"> Pages </span>
      </th>
      <td mat-cell *matCellDef="let element">{{ element.pages }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th class="non-sortable" mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let element">
        <button mat-icon-button aria-label="Edit" (click)="editBook(element)">
          <mat-icon fontIcon="edit"></mat-icon>
        </button>
        <button mat-icon-button color="warn" aria-label="Delete" (click)="confirmDelete(element)">
          <mat-icon fontIcon="delete"></mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  @if (!totalBooksCount()) {
    <div class="empty-state-message">Library is empty</div>
  } @else if (!booksCount()) {
    <div class="empty-state-message">Nothing found</div>
  }

  <mat-paginator
    [class.hidden]="!booksCount()"
    [pageSizeOptions]="[5, 10, 25]"
    showFirstLastButtons
  ></mat-paginator>
</div>
