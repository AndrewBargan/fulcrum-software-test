<div class="books-actions">
  <button mat-raised-button color="primary" (click)="importBooks()">Import</button>
  <button mat-raised-button (click)="exportBooks()">Export</button>
</div>

<div class="search-bar">
  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Search books</mat-label>
    <input
      matInput
      type="text"
      placeholder="Title"
      [value]="searchQuery"
      (input)="updateSearch($event.target.value)"
    />
    @if (searchQuery) {
      <button matSuffix mat-icon-button aria-label="Clear search" (click)="clearSearch()">
        <mat-icon>close</mat-icon>
      </button>
    }
  </mat-form-field>
</div>

<table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
  <ng-container matColumnDef="author">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>
      <button mat-button class="header-button" (click)="sortAuthor()">
        Author
        <span class="sort-icon">{{ sortIcon(authorOrder) }}</span>
      </button>
    </th>
    <td mat-cell *matCellDef="let element">{{ element.author }}</td>
  </ng-container>

  <ng-container matColumnDef="title">
    <th mat-header-cell *matHeaderCellDef>
      <button mat-button class="header-button" (click)="sortTitle()">
        Title
        <span class="sort-icon">{{ sortIcon(titleOrder) }}</span>
      </button>
    </th>
    <td mat-cell *matCellDef="let element">{{ element.title }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let element"></td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>

<mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons></mat-paginator>
